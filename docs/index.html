<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Where I Have Been</title>
    <meta
      name="description"
      content="사진 메타데이터에서 방문 기록을 추출해 전세계 지도 위에 시각화하는 단일 페이지 앱"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Travel Atlas</p>
          <h1>내 사진이 곧 여행 기록이 되도록.</h1>
          <p class="hero-text">
            iPhone 사진의 촬영 시각과 GPS 메타데이터를 읽어, 언제 어디를 방문했는지
            한 장의 지도 위에 정리합니다. 같은 장소를 여러 날 방문했다면 한 핀에서
            <code>n회 방문</code>으로 묶어 보여줍니다.
          </p>
        </div>
        <div class="hero-actions">
          <label class="file-button" for="json-upload">
            JSON 불러오기
            <input id="json-upload" type="file" accept="application/json" />
          </label>
          <button id="load-sample" class="ghost-button" type="button">
            샘플 데이터 보기
          </button>
          <p id="status-line" class="status-line">
            docs/data/trips.json을 불러오는 중입니다.
          </p>
        </div>
      </header>

      <section class="stats-grid" aria-label="요약 통계">
        <article class="stat-card">
          <span class="stat-label">전체 사진</span>
          <strong id="stat-total-photos" class="stat-value">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">지도에 올라간 사진</span>
          <strong id="stat-geotagged-photos" class="stat-value">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">방문 지역</span>
          <strong id="stat-visit-areas" class="stat-value">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-label">방문 국가</span>
          <strong id="stat-countries" class="stat-value">0</strong>
        </article>
      </section>

      <main class="layout">
        <section class="panel map-panel">
          <div class="panel-head">
            <div>
              <p class="panel-eyebrow">Map</p>
              <h2>Visited Places</h2>
            </div>
            <p id="map-summary" class="panel-meta">표시할 방문 기록이 없습니다.</p>
          </div>
          <div id="map" aria-label="방문 지도"></div>
        </section>

        <aside class="sidebar">
          <section class="panel filters-panel">
            <div class="panel-head compact">
              <div>
                <p class="panel-eyebrow">Filters</p>
                <h2>연도별 보기</h2>
              </div>
            </div>
            <div id="year-filters" class="year-filters"></div>
          </section>

          <section class="panel visits-panel">
            <div class="panel-head compact">
              <div>
                <p class="panel-eyebrow">Timeline</p>
                <h2>방문 기록</h2>
              </div>
              <p id="generated-at" class="panel-meta">생성 시각 없음</p>
            </div>
            <div id="visit-list" class="visit-list"></div>
          </section>
        </aside>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js" defer></script>
  </body>
</html>
